# BECS Nginx Single-Domain Subpath Configuration Template
# Replace 'yourdomain.com' with your actual domain (e.g., banerjeeelectronics.com)

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # 1. Main Website (Root /)
    location / {
        root /var/www/becs/client/main-website/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. E-Commerce Store (/store/)
    location /store {
        alias /var/www/becs/client/becs-store/dist;
        index index.html;
        try_files $uri $uri/ /store/index.html;
    }

    # 3. Admin Control Panel (/admin/)
    location /admin {
        alias /var/www/becs/client/admin/dist;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 4. Training Institute (/training/)
    location /training {
        alias /var/www/becs/client/training-institute/dist;
        index index.html;
        try_files $uri $uri/ /training/index.html;
    }

    # 5. Backend Server API (/api/)
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom Error Pages
    error_page 404 /index.html;

    # Static Assets Caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }
}
