# BECS Nginx Subdomain Configuration Template
# Replace 'yourdomain.com' with your actual domain (e.g., banerjeeelectronics.com)

# 1. Main Website (becs.com & www.yourdomain.com)
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/becs/client/main-website/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests if needed, but it's recommended to use api.yourdomain.com
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }
}

